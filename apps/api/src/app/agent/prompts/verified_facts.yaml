  confidence_ceiling_without_tool: 85

- id: cwe_089_sqlalchemy_bound_params_safe
  vendor: cwe
  topic: CWE-89 SQLAlchemy bind parameters
  cwe_id: "CWE-89"
  abstraction: variant
  parents: []
  children: []
  can_precede: []
  requires_sink: true
  requires_attacker_control: true
  keywords: ["sqlalchemy", "text(", "bindparam", "execute(", "query("]
  anti_fact_keywords: [":param", "params=", "bindparams", "?"]
  fact: |
    SQL injection requires user-controlled input to alter SQL structure. Bound
    parameters in SQLAlchemy separate values from query structure.
  anti_fact: |
    Do NOT flag SQLi solely because user data reaches execute/query when bind
    parameters are correctly used and SQL structure is not string-concatenated.
  source: https://cwe.mitre.org/data/definitions/89.html
  severity_ceiling_without_tool: medium
  confidence_ceiling_without_tool: 85

- id: cwe_022_path_resolve_containment_safe
  vendor: cwe
  topic: CWE-22 path resolve containment check
  cwe_id: "CWE-22"
  abstraction: variant
  parents: []
  children: []
  can_precede: []
  requires_sink: true
  requires_attacker_control: true
  keywords: ["path.resolve", "resolve()", "startsWith(", "path traversal", ".."]
  anti_fact_keywords: ["realpath", "resolve", "normalized", "containment"]
  fact: |
    Path traversal requires attacker input to escape an allowed directory and
    reach unauthorized file access. Normalization and post-join containment checks
    can block traversal when applied before file access.
  anti_fact: |
    Do NOT flag traversal when the implementation resolves to a canonical path and
    enforces allowed-root containment before opening/reading files.
  source: https://cwe.mitre.org/data/definitions/22.html
  severity_ceiling_without_tool: medium
  confidence_ceiling_without_tool: 85
