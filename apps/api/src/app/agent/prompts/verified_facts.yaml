- id: vercel_forwarded_for
  vendor: vercel
  topic: x-vercel-forwarded-for header
  keywords: ["x-vercel-forwarded-for", "vercel forwarded"]
  fact: |
    Vercel's `x-vercel-forwarded-for` is set by Vercel's edge. The client IP is
    at position 0 (first). Extracting parts[0] is correct for Vercel-hosted apps.
  anti_fact: |
    Do NOT suggest extracting the last IP. That applies to generic x-forwarded-for
    behind untrusted proxy chains, not to Vercel's header.
  source: https://vercel.com/docs/edge-network/headers
  severity_ceiling_without_tool: medium
  confidence_ceiling_without_tool: 85

- id: supabase_generated_types
  vendor: supabase
  topic: generated types files
  keywords: ["supabase/types.ts", "Database = {", "generated from schema"]
  fact: |
    Supabase type files (commonly lib/supabase/types.ts) are generated.
    Do not suggest manual edits. If types are wrong, suggest regeneration or a
    schema/migration correction.
  anti_fact: |
    Do NOT suggest hand-editing generated Supabase types. Fix by regenerating
    types or updating the underlying migration/schema.
  severity_ceiling_without_tool: medium
  confidence_ceiling_without_tool: 85

- id: csp_report_uri
  vendor: browser
  topic: CSP report-uri vs report-to
  keywords: ["report-uri", "report-to", "content-security-policy"]
  fact: |
    `report-uri` remains supported by modern browsers. `report-to` is preferred
    for structured reporting but not strictly required. Do not claim `report-uri`
    usage is broken without context-specific requirements.
  anti_fact: |
    Do NOT claim `report-uri` is outright broken or unusable in modern browsers.
  severity_ceiling_without_tool: medium
  confidence_ceiling_without_tool: 85

- id: cwe_079_react_jsx_safe_interp
  vendor: cwe
  topic: CWE-79 React JSX interpolation
  cwe_id: "CWE-79"
  abstraction: variant
  parents: ["cwe_079_dom_xss_sink_required"]
  children: []
  can_precede: ["cwe_079_dom_xss_sink_required"]
  requires_sink: true
  requires_attacker_control: true
  keywords: ["{", "}", "react", "jsx", "userInput"]
  anti_fact_keywords: ["dangerouslySetInnerHTML", "innerHTML", "href", "srcdoc"]
  fact: |
    Ordinary React JSX text interpolation is escaped by default. CWE-79 requires
    attacker-controlled data reaching a concrete executable sink without proper
    escaping or sanitization.
  anti_fact: |
    Do NOT flag plain JSX text interpolation as XSS by itself. Require a concrete
    sink (for example dangerouslySetInnerHTML or direct DOM HTML injection) and
    attacker control of that sink payload.
  source: https://cwe.mitre.org/data/definitions/79.html
  severity_ceiling_without_tool: medium
  confidence_ceiling_without_tool: 85

- id: cwe_079_dom_xss_sink_required
  vendor: cwe
  topic: CWE-79 sink requirement
  cwe_id: "CWE-79"
  abstraction: base
  parents: []
  children: ["cwe_079_react_jsx_safe_interp"]
