[build]
builder = "NIXPACKS"
# Force Railway/Nixpacks away from its auto-detected `uv sync` build step.
# The generated image does not install `uv`, and this project installs cleanly
# as a package after the full `src/` tree has been copied into the image.
buildCommand = ". /opt/venv/bin/activate && pip install ."

[deploy]
# Use Python to read PORT — some runners do not expand `$PORT` in the shell.
startCommand = "python -m app.serve_railway"
healthcheckPath = "/health"
# Allow Redis + migrations + cold start; 30s is often too tight on Railway.
healthcheckTimeout = 180
restartPolicyType = "ON_FAILURE"

# ARQ worker (separate Railway service, same root directory apps/api):
# Point that service at apps/api/railway.worker.json (Settings → Config as code
# / config file path). That file runs `python -m arq app.queue.worker.WorkerSettings`
# and sets healthcheckPath to null — do not use this railway.toml for the worker
# or you will get uvicorn on the worker.
