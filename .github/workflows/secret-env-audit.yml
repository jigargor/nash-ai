name: Secret Env Audit

on:
  schedule:
    - cron: "0 10 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit-secret-env-names:
    name: Audit Railway/Vercel env names
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Compare configured env names to matrix
        shell: bash
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
          RAILWAY_ENVIRONMENT_ID: ${{ secrets.RAILWAY_ENVIRONMENT_ID }}
          RAILWAY_SERVICE_API_ID: ${{ secrets.RAILWAY_SERVICE_API_ID }}
          RAILWAY_SERVICE_WORKER_ID: ${{ secrets.RAILWAY_SERVICE_WORKER_ID }}
          RAILWAY_SERVICE_POSTGRES_ID: ${{ secrets.RAILWAY_SERVICE_POSTGRES_ID }}
          RAILWAY_SERVICE_REDIS_ID: ${{ secrets.RAILWAY_SERVICE_REDIS_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TEAM_ID: ${{ secrets.VERCEL_TEAM_ID }}
        run: |
          python3 - <<'PYEOF'
          import json
          import os
          import sys
          import urllib.error
          import urllib.parse
          import urllib.request
          from pathlib import Path

          MATRIX_PATH = Path("docs/secret-env-matrix.json")
          RAILWAY_GRAPHQL_URL = "https://backboard.railway.app/graphql/v2"
          VERCEL_BASE_URL = "https://api.vercel.com"

          matrix = json.loads(MATRIX_PATH.read_text(encoding="utf-8"))

          def api_request(url: str, *, method: str = "GET", headers: dict[str, str] | None = None, payload: dict | None = None) -> dict:
              data = None
              req_headers = dict(headers or {})
              if payload is not None:
                  data = json.dumps(payload).encode("utf-8")
                  req_headers["Content-Type"] = "application/json"
              request = urllib.request.Request(url, data=data, method=method, headers=req_headers)
              try:
                  with urllib.request.urlopen(request, timeout=30) as response:
                      body = response.read().decode("utf-8")
              except urllib.error.HTTPError as exc:
                  details = exc.read().decode("utf-8", errors="replace")
                  raise RuntimeError(f"HTTP {exc.code} for {url}: {details[:500]}") from exc
              if not body:
                  return {}
              return json.loads(body)

          def railway_fetch_names(service_id: str) -> set[str]:
              token = os.getenv("RAILWAY_TOKEN")
              project_id = os.getenv("RAILWAY_PROJECT_ID")
              environment_id = os.getenv("RAILWAY_ENVIRONMENT_ID")
              if not token or not project_id or not environment_id:
                  raise RuntimeError("Missing one or more required Railway IDs/tokens.")

              query = """
              query SecretEnvAudit($projectId: String!, $environmentId: String!, $serviceId: String!) {
                variables(projectId: $projectId, environmentId: $environmentId, serviceId: $serviceId) {
                  edges {
                    node {
                      name
                    }
                  }
                }
              }
              """
              payload = {
                  "query": query,
                  "variables": {
                      "projectId": project_id,
                      "environmentId": environment_id,
                      "serviceId": service_id,
                  },
              }
              response = api_request(
                  RAILWAY_GRAPHQL_URL,
                  method="POST",
                  headers={"Authorization": f"Bearer {token}"},
                  payload=payload,
              )
              if "errors" in response:
                  raise RuntimeError(f"Railway GraphQL error: {response['errors']}")
              edges = (
                  response.get("data", {})
                  .get("variables", {})
                  .get("edges", [])
              )
              return {edge.get("node", {}).get("name", "") for edge in edges if edge.get("node", {}).get("name")}

          def vercel_fetch_names(target_env: str) -> set[str]:
              token = os.getenv("VERCEL_TOKEN")
              project_id = os.getenv("VERCEL_PROJECT_ID")
              team_id = os.getenv("VERCEL_TEAM_ID")
              if not token or not project_id:
                  raise RuntimeError("Missing one or more required Vercel IDs/tokens.")

              names: set[str] = set()
              next_cursor = None
              while True:
                  query = {
                      "target": target_env,
                      "decrypt": "false",
                      "limit": "100",
                  }
                  if next_cursor:
                      query["until"] = str(next_cursor)
                  if team_id:
                      query["teamId"] = team_id
                  query_string = urllib.parse.urlencode(query)
                  url = f"{VERCEL_BASE_URL}/v9/projects/{project_id}/env?{query_string}"
                  response = api_request(url, headers={"Authorization": f"Bearer {token}"})
                  for item in response.get("envs", []):
                      key = item.get("key")
                      if key:
                          names.add(key)
                  pagination = response.get("pagination", {})
                  next_cursor = pagination.get("next")
                  if not next_cursor:
                      break
              return names

          def compare(scope_name: str, actual: set[str], required: list[str], optional: list[str]) -> tuple[list[str], list[str]]:
              allowed = set(required) | set(optional)
              missing = sorted(set(required) - actual)
              extra = sorted(actual - allowed)
              print(f"{scope_name}: found {len(actual)} names")
              if missing:
                  print(f"  missing ({len(missing)}): {', '.join(missing)}")
              if extra:
                  print(f"  extraneous ({len(extra)}): {', '.join(extra)}")
              if not missing and not extra:
                  print("  ok: no matrix violations")
              return missing, extra

          violations: list[str] = []
          warnings: list[str] = []

          railway_services = matrix["railway"]["services"]
          for service_name, config in railway_services.items():
              service_id_secret = config.get("service_id_secret", "")
              service_id = os.getenv(service_id_secret)
              if not service_id:
                  warnings.append(f"Railway service '{service_name}' skipped (missing secret {service_id_secret}).")
                  continue
              try:
                  actual_names = railway_fetch_names(service_id)
              except Exception as exc:
                  violations.append(f"Railway service '{service_name}' query failed: {exc}")
                  continue

              missing, extra = compare(
                  f"railway/{service_name}",
                  actual_names,
                  config.get("required", []),
                  config.get("optional", []),
              )
              if config.get("enforcement") == "strict" and (missing or extra):
                  violations.append(
                      f"railway/{service_name}: missing={len(missing)} extraneous={len(extra)}"
                  )
              if config.get("enforcement") != "strict" and (missing or extra):
                  warnings.append(
                      f"railway/{service_name}: advisory mismatch missing={len(missing)} extraneous={len(extra)}"
                  )

          vercel_envs = matrix["vercel"]["environments"]
          for env_name, config in vercel_envs.items():
              try:
                  actual_names = vercel_fetch_names(env_name)
              except Exception as exc:
                  violations.append(f"Vercel env '{env_name}' query failed: {exc}")
                  continue

              missing, extra = compare(
                  f"vercel/{env_name}",
                  actual_names,
                  config.get("required", []),
                  config.get("optional", []),
              )
              if config.get("enforcement") == "strict" and (missing or extra):
                  violations.append(
                      f"vercel/{env_name}: missing={len(missing)} extraneous={len(extra)}"
                  )
              if config.get("enforcement") != "strict" and (missing or extra):
                  warnings.append(
                      f"vercel/{env_name}: advisory mismatch missing={len(missing)} extraneous={len(extra)}"
                  )

          if warnings:
              print("\nWarnings:")
              for warning in warnings:
                  print(f"- {warning}")

          if violations:
              print("\nViolations:")
              for violation in violations:
                  print(f"- {violation}")
              sys.exit(1)

          print("\nSecret env audit completed with no strict matrix violations.")
          PYEOF
