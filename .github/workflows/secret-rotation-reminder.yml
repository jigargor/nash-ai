name: Secret Rotation Reminder

on:
  schedule:
    # Every Monday at 09:00 UTC — adjust to your team's timezone if needed.
    - cron: "0 9 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  check-rotation:
    name: Check secret staleness
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Check rotation log and create/update GitHub issue if stale
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          python3 - <<'PYEOF'
          import json
          import os
          import subprocess
          from datetime import date
          from pathlib import Path

          log = json.loads(Path("docs/rotation-log.json").read_text())
          today = date.today()
          overdue = []
          upcoming = []  # expiring within 14 days

          for entry in log.get("secrets", []):
              last_str = entry.get("last_rotated")
              max_age = entry["max_age_days"]
              if not last_str:
                  overdue.append({**entry, "age_days": "unknown", "status": "[!] date missing"})
                  continue
              age = (today - date.fromisoformat(last_str)).days
              expires_in = max_age - age
              if expires_in <= 0:
                  overdue.append({**entry, "age_days": age,
                                  "status": f"OVERDUE +{abs(expires_in)} days"})
              elif expires_in <= 14:
                  upcoming.append({**entry, "age_days": age,
                                   "status": f"DUE SOON {expires_in} days left"})

          if not overdue and not upcoming:
              print("All secrets are within their rotation window.")
              raise SystemExit(0)

          def table_rows(entries):
              rows = []
              for e in entries:
                  rows.append(
                      f"| `{e['name']}` | {e.get('age_days', '?')} | {e['max_age_days']} "
                      f"| {e['status']} | {', '.join(e['platform'])} "
                      f"| [guide]({e['rotation_guide']}) |"
                  )
              return "\n".join(rows)

          header = "| Secret | Age (days) | Max age | Status | Platforms | Guide |\n|--------|-----------|---------|--------|-----------|-------|"
          sections = []
          if overdue:
              sections.append(
                  f"### Overdue ({len(overdue)})\n\n{header}\n{table_rows(overdue)}"
              )
          if upcoming:
              sections.append(
                  f"### Due within 14 days ({len(upcoming)})\n\n{header}\n{table_rows(upcoming)}"
              )

          next_steps = (
              "\n\n### Next steps\n\n"
              "1. Rotate overdue secrets following "
              "[docs/secrets-rotation.md](../../docs/secrets-rotation.md).\n"
              "2. Update `docs/rotation-log.json` -- set `last_rotated` to "
              f"`{today.isoformat()}` for each rotated secret.\n"
              "3. Push the update and close this issue.\n\n"
              "_Auto-generated by the `secret-rotation-reminder` workflow."
              f" Last checked: {today.isoformat()}._"
          )
          body = "## Secret rotation reminder\n\n" + "\n\n".join(sections) + next_steps

          repo = os.environ["REPO"]

          # Ensure the label exists (--force is idempotent).
          subprocess.run(
              ["gh", "label", "create", "secret-rotation", "--repo", repo,
               "--description", "Secret rotation is due or overdue",
               "--color", "E4E669", "--force"],
              capture_output=True,
          )

          # Check for an existing open issue to avoid duplicates.
          result = subprocess.run(
              ["gh", "issue", "list", "--repo", repo, "--label", "secret-rotation",
               "--state", "open", "--json", "number"],
              capture_output=True, text=True, check=True,
          )
          existing = json.loads(result.stdout)

          title = (
              f"[Security] Secret rotation overdue: {len(overdue)} secret(s) past deadline"
              if overdue else
              f"[Security] Secret rotation due soon: {len(upcoming)} secret(s) expiring within 14 days"
          )

          if existing:
              num = existing[0]["number"]
              subprocess.run(
                  ["gh", "issue", "edit", str(num), "--repo", repo,
                   "--title", title, "--body", body],
                  check=True,
              )
              print(f"Updated existing issue #{num}")
          else:
              result = subprocess.run(
                  ["gh", "issue", "create", "--repo", repo,
                   "--title", title,
                   "--label", "secret-rotation,security",
                   "--body", body],
                  capture_output=True, text=True, check=True,
              )
              print(f"Created issue: {result.stdout.strip()}")
          PYEOF
