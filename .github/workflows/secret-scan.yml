name: Secret Scan

on:
  push:
    branches: [main, develop]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write    # allow gitleaks-action to comment on PRs
  security-events: write  # upload SARIF to GitHub Security tab

jobs:
  gitleaks:
    name: Detect secrets
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          # Full depth needed so gitleaks can walk commit history for push events.
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          config-path: .gitleaks.toml
