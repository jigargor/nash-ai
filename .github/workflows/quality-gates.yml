name: Quality Gates

on:
  pull_request:
    paths:
      - "apps/api/**"
      - "apps/web/**"
      - "packages/**"
      - "pyproject.toml"
      - "pnpm-workspace.yaml"
      - "package.json"
      - ".github/workflows/quality-gates.yml"
  push:
    branches:
      - main
      - develop
    paths:
      - "apps/api/**"
      - "apps/web/**"
      - "packages/**"
      - "pyproject.toml"
      - "pnpm-workspace.yaml"
      - "package.json"
      - ".github/workflows/quality-gates.yml"

permissions:
  contents: read

jobs:
  backend-checks:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: codereview
          POSTGRES_USER: dev
          POSTGRES_PASSWORD: dev
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U dev -d codereview"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+asyncpg://dev:dev@localhost:5433/codereview
      TEST_DATABASE_URL: postgresql+asyncpg://dev:dev@localhost:5433/codereview_test
      GITHUB_APP_ID: ${{ secrets.APP_ID || '0' }}
      GITHUB_WEBHOOK_SECRET: ${{ secrets.APP_WEBHOOK_SECRET || 'test-webhook-secret' }}
      GITHUB_CLIENT_ID: ${{ secrets.APP_CLIENT_ID || 'test-client-id' }}
      GITHUB_CLIENT_SECRET: ${{ secrets.APP_CLIENT_SECRET || 'test-client-secret' }}
      APP_PRIVATE_KEY_PEM_PATH: private-key.pem
      FERNET_KEY: 4nYA5RU2f22W4DvwW8Hpt4W6YKfYwQMUqlGQv6ygfA4=
      ANTHROPIC_API_KEY: test-anthropic-key
      ENVIRONMENT: development
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v7
      - name: Install dependencies
        run: uv sync --extra dev
      - name: Materialize GitHub App private key
        shell: bash
        run: |
          if [ -n "${{ secrets.APP_PRIVATE_KEY_PEM }}" ]; then
            printf '%s\n' "${{ secrets.APP_PRIVATE_KEY_PEM }}" > private-key.pem
          fi
      - name: Fail on merge conflict markers
        shell: bash
        run: |
          if git grep -nE '^(<<<<<<<|=======|>>>>>>>)' -- ':!uv.lock' ':!pnpm-lock.yaml'; then
            echo "Merge conflict markers found."
            exit 1
          fi
      - name: Ruff
        run: uv run ruff check .
      - name: Mypy
        run: uv run mypy src
      - name: Migrations
        run: uv run alembic upgrade head
      - name: Pytest (with coverage)
        run: uv run pytest --cov=src/app --cov-report=json:coverage.json --cov-report=term-missing
      - name: Enforce per-module coverage thresholds
        run: uv run python scripts/check_coverage.py coverage.json coverage_thresholds.json
      - name: Bandit
        run: uv run bandit -r src
      - name: Audit Python dependencies
        run: uv run pip-audit

  frontend-checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
      - uses: pnpm/action-setup@v6
      - name: Install dependencies
        run: pnpm install --frozen-lockfile=false
      - name: Web lint
        run: pnpm --filter web lint
      - name: Web typecheck
        run: pnpm --filter web typecheck
      - name: Web tests
        run: pnpm --filter web test
      - name: Web build
        run: pnpm --filter web build
      - name: Audit Node dependencies
        run: pnpm audit --audit-level high

  evals:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'prompt-change')
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v7
      - name: Install backend dependencies
        run: uv sync --extra dev
        working-directory: apps/api
      - name: Generate eval predictions (snapshot replay)
        run: |
          python evals/generate_predictions.py \
            --prompt-version candidate \
            --mode snapshot \
            --datasets-dir evals/datasets \
            --output-dir evals/predictions/candidate
      - name: Fail on stale predictions
        shell: bash
        run: |
          python - <<'PY'
          import hashlib, json, sys
          from pathlib import Path

          repo_root = Path(".")
          prompts_dir = repo_root / "apps" / "api" / "src" / "app" / "agent" / "prompts"
          constants_file = repo_root / "apps" / "api" / "src" / "app" / "agent" / "constants.py"

          def _prompt_version_from_constants() -> str:
              if not constants_file.exists():
                  return "unknown"
              for line in constants_file.read_text(encoding="utf-8").splitlines():
                  if line.strip().startswith("PROMPT_VERSION"):
                      parts = line.strip().split("=", 1)
                      if len(parts) == 2:
                          return parts[1].strip().strip('"').strip("'")
              return "unknown"

          h = hashlib.sha256()
          h.update(b"candidate")
          h.update(_prompt_version_from_constants().encode())
          if prompts_dir.exists():
              for f in sorted(prompts_dir.rglob("*")):
                  if f.is_file():
                      h.update(f.relative_to(prompts_dir).as_posix().encode())
                      h.update(f.read_bytes())
          expected_hash = h.hexdigest()

          stale = []
          preds_dir = Path("evals/predictions/candidate")
          if preds_dir.exists():
              for pred_file in sorted(preds_dir.glob("*.json")):
                  try:
                      payload = json.loads(pred_file.read_text(encoding="utf-8"))
                  except Exception:
                      stale.append(pred_file.stem + " (unreadable)")
                      continue
                  stored = payload.get("code_hash", "")
                  if stored != expected_hash:
                      stale.append(pred_file.stem)
          if stale:
              print(f"STALE predictions detected (code_hash mismatch): {stale}")
              print("Re-run `python evals/generate_predictions.py --mode=snapshot --prompt-version candidate` and commit the updated predictions.")
              sys.exit(1)
          print(f"All predictions are up-to-date (hash={expected_hash[:16]}…)")
          PY
      - name: Run eval harness
        run: python evals/run_eval.py --prompt-version candidate --predictions-dir evals/predictions/candidate
      - name: Compare against baseline
        run: |
          if [ -f evals/baseline/manifest.json ]; then
            baseline_version=$(python -c "import json; m=json.load(open('evals/baseline/manifest.json')); print(m.get('prompt_version','baseline'))")
            if [ -f "evals/results/${baseline_version}.json" ]; then
              python evals/compare.py \
                "evals/results/${baseline_version}.json" \
                evals/results/candidate.json \
                --output evals/results/comparison.json
            else
              echo "Baseline result file not found for version ${baseline_version}, skipping regression check."
            fi
          else
            echo "No baseline/manifest.json found, skipping regression check."
          fi
      - name: Enforce eval thresholds
        shell: bash
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          result = json.loads(Path("evals/results/candidate.json").read_text(encoding="utf-8"))
          metrics = result.get("metrics", {})
          precision = float(metrics.get("precision", 0.0))
          recall = float(metrics.get("recall", 0.0))
          fp_rate = float(metrics.get("fp_rate", 1.0))
          if precision < 0.8 or recall < 0.7 or fp_rate > 0.15:
              raise SystemExit(f"Eval thresholds failed: precision={precision} recall={recall} fp_rate={fp_rate}")
          print(f"Eval thresholds passed: precision={precision} recall={recall} fp_rate={fp_rate}")
          PY
