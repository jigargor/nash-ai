name: Quality Gates

on:
  pull_request:
    paths:
      - "apps/api/**"
      - "apps/web/**"
      - "packages/**"
      - "pyproject.toml"
      - "pnpm-workspace.yaml"
      - "package.json"
      - ".github/workflows/quality-gates.yml"
  push:
    branches:
      - main
    paths:
      - "apps/api/**"
      - "apps/web/**"
      - "packages/**"
      - "pyproject.toml"
      - "pnpm-workspace.yaml"
      - "package.json"
      - ".github/workflows/quality-gates.yml"

jobs:
  backend-checks:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: codereview
          POSTGRES_USER: dev
          POSTGRES_PASSWORD: dev
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U dev -d codereview"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+asyncpg://dev:dev@localhost:5433/codereview
      TEST_DATABASE_URL: postgresql+asyncpg://dev:dev@localhost:5433/codereview_test
      GITHUB_APP_ID: "0"
      GITHUB_WEBHOOK_SECRET: test-webhook-secret
      GITHUB_CLIENT_ID: test-client-id
      GITHUB_CLIENT_SECRET: test-client-secret
      FERNET_KEY: 4nYA5RU2f22W4DvwW8Hpt4W6YKfYwQMUqlGQv6ygfA4=
      ANTHROPIC_API_KEY: test-anthropic-key
      ENVIRONMENT: development
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v5
      - name: Install dependencies
        run: uv sync --extra dev
      - name: Ruff
        run: uv run ruff check .
      - name: Mypy
        run: uv run mypy src
      - name: Migrations
        run: uv run alembic upgrade head
      - name: Pytest
        run: uv run pytest

  frontend-checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - name: Install dependencies
        run: pnpm install --frozen-lockfile=false
      - name: Web lint
        run: pnpm --filter web lint
      - name: Web typecheck
        run: pnpm --filter web typecheck
