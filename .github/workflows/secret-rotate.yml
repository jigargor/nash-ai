name: Secret Rotate

on:
  workflow_dispatch:
    inputs:
      group:
        description: "Rotation group from docs/secret-env-matrix.json (for example: api_access_key)"
        required: true
        type: string
      target:
        description: "Where to apply updates"
        required: true
        type: choice
        options:
          - all
          - railway
          - vercel
      dry_run:
        description: "Preview changes without writing providers"
        required: true
        default: true
        type: boolean
      confirm:
        description: "Required when dry_run=false: type ROTATE"
        required: false
        default: ""
        type: string

permissions:
  contents: read

jobs:
  rotate-selected-group:
    name: Rotate selected secret group
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Rotate group across targets
        shell: bash
        env:
          ROTATION_GROUP: ${{ inputs.group }}
          ROTATION_TARGET: ${{ inputs.target }}
          ROTATION_DRY_RUN: ${{ inputs.dry_run }}
          ROTATION_CONFIRM: ${{ inputs.confirm }}
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
          RAILWAY_ENVIRONMENT_ID: ${{ secrets.RAILWAY_ENVIRONMENT_ID }}
          RAILWAY_SERVICE_API_ID: ${{ secrets.RAILWAY_SERVICE_API_ID }}
          RAILWAY_SERVICE_WORKER_ID: ${{ secrets.RAILWAY_SERVICE_WORKER_ID }}
          RAILWAY_SERVICE_POSTGRES_ID: ${{ secrets.RAILWAY_SERVICE_POSTGRES_ID }}
          RAILWAY_SERVICE_REDIS_ID: ${{ secrets.RAILWAY_SERVICE_REDIS_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TEAM_ID: ${{ secrets.VERCEL_TEAM_ID }}
        run: |
          python3 - <<'PYEOF'
          import json
          import os
          import secrets
          import string
          import sys
          import urllib.error
          import urllib.parse
          import urllib.request
          from datetime import date, datetime, timezone
          from pathlib import Path

          MATRIX_PATH = Path("docs/secret-env-matrix.json")
          ROTATION_LOG_PATH = Path("docs/rotation-log.json")
          OUTPUT_LOG_PATH = Path("rotation-log.updated.json")
          RAILWAY_GRAPHQL_URL = "https://backboard.railway.app/graphql/v2"
          VERCEL_BASE_URL = "https://api.vercel.com"

          matrix = json.loads(MATRIX_PATH.read_text(encoding="utf-8"))
          rotation_log = json.loads(ROTATION_LOG_PATH.read_text(encoding="utf-8"))

          group_name = os.getenv("ROTATION_GROUP", "").strip()
          target = os.getenv("ROTATION_TARGET", "all").strip().lower()
          dry_run = os.getenv("ROTATION_DRY_RUN", "true").strip().lower() == "true"
          confirm = os.getenv("ROTATION_CONFIRM", "").strip()
          today_iso = date.today().isoformat()
          now_iso = datetime.now(timezone.utc).replace(microsecond=0).isoformat().replace("+00:00", "Z")

          groups = matrix.get("rotation_groups", {})
          if group_name not in groups:
              print(f"Unknown rotation group: {group_name}")
              print(f"Available groups: {', '.join(sorted(groups.keys()))}")
              sys.exit(1)

          group_config = groups[group_name]
          mode = group_config.get("mode")
          if mode == "manual_only":
              reason = group_config.get("blocked_reason", "This group is manual-only.")
              print(f"Group '{group_name}' is blocked from automation.")
              print(f"Reason: {reason}")
              sys.exit(1)

          if not dry_run and confirm != "ROTATE":
              print("dry_run is false but confirmation phrase is missing.")
              print("Re-run with confirm=ROTATE.")
              sys.exit(1)

          if target not in {"all", "railway", "vercel"}:
              print("target must be one of: all, railway, vercel")
              sys.exit(1)

          def api_request(url: str, *, method: str = "GET", headers: dict[str, str] | None = None, payload: dict | None = None) -> dict:
              data = None
              req_headers = dict(headers or {})
              if payload is not None:
                  data = json.dumps(payload).encode("utf-8")
                  req_headers["Content-Type"] = "application/json"
              request = urllib.request.Request(url, data=data, method=method, headers=req_headers)
              try:
                  with urllib.request.urlopen(request, timeout=30) as response:
                      body = response.read().decode("utf-8")
              except urllib.error.HTTPError as exc:
                  details = exc.read().decode("utf-8", errors="replace")
                  raise RuntimeError(f"HTTP {exc.code} for {url}: {details[:500]}") from exc
              if not body:
                  return {}
              return json.loads(body)

          def generate_secret_value() -> str:
              # URL-safe 64-char-ish secret suitable for keys and HMAC-style secrets.
              alphabet = string.ascii_letters + string.digits + "-_"
              return "".join(secrets.choice(alphabet) for _ in range(64))

          def railway_upsert(service_id: str, key: str, value: str) -> None:
              token = os.getenv("RAILWAY_TOKEN")
              project_id = os.getenv("RAILWAY_PROJECT_ID")
              environment_id = os.getenv("RAILWAY_ENVIRONMENT_ID")
              if not token or not project_id or not environment_id:
                  raise RuntimeError("Missing one or more required Railway IDs/tokens.")

              mutation = """
              mutation SecretRotate($input: VariableUpsertInput!) {
                variableUpsert(input: $input) {
                  id
                  name
                }
              }
              """
              payload = {
                  "query": mutation,
                  "variables": {
                      "input": {
                          "projectId": project_id,
                          "environmentId": environment_id,
                          "serviceId": service_id,
                          "name": key,
                          "value": value,
                      }
                  },
              }
              response = api_request(
                  RAILWAY_GRAPHQL_URL,
                  method="POST",
                  headers={"Authorization": f"Bearer {token}"},
                  payload=payload,
              )
              if "errors" in response:
                  raise RuntimeError(f"Railway GraphQL error: {response['errors']}")

          def vercel_list_envs(target_env: str) -> list[dict]:
              token = os.getenv("VERCEL_TOKEN")
              project_id = os.getenv("VERCEL_PROJECT_ID")
              team_id = os.getenv("VERCEL_TEAM_ID")
              if not token or not project_id:
                  raise RuntimeError("Missing one or more required Vercel IDs/tokens.")
              query = {
                  "target": target_env,
                  "decrypt": "false",
                  "limit": "100",
              }
              if team_id:
                  query["teamId"] = team_id
              url = f"{VERCEL_BASE_URL}/v9/projects/{project_id}/env?{urllib.parse.urlencode(query)}"
              response = api_request(url, headers={"Authorization": f"Bearer {token}"})
              return response.get("envs", [])

          def vercel_upsert(target_env: str, key: str, value: str) -> None:
              token = os.getenv("VERCEL_TOKEN")
              project_id = os.getenv("VERCEL_PROJECT_ID")
              team_id = os.getenv("VERCEL_TEAM_ID")
              if not token or not project_id:
                  raise RuntimeError("Missing one or more required Vercel IDs/tokens.")

              headers = {"Authorization": f"Bearer {token}"}
              existing = None
              for item in vercel_list_envs(target_env):
                  if item.get("key") == key and target_env in item.get("target", []):
                      existing = item
                      break

              base_query = {}
              if team_id:
                  base_query["teamId"] = team_id
              query_suffix = f"?{urllib.parse.urlencode(base_query)}" if base_query else ""

              payload = {
                  "key": key,
                  "value": value,
                  "target": [target_env],
                  "type": "encrypted",
              }
              if existing and existing.get("id"):
                  api_request(
                      f"{VERCEL_BASE_URL}/v9/projects/{project_id}/env/{existing['id']}{query_suffix}",
                      method="PATCH",
                      headers=headers,
                      payload=payload,
                  )
                  return

              api_request(
                  f"{VERCEL_BASE_URL}/v10/projects/{project_id}/env{query_suffix}",
                  method="POST",
                  headers=headers,
                  payload=payload,
              )

          plan: list[dict] = []
          generated_value = generate_secret_value()

          for variable in group_config.get("variables", []):
              key = variable["name"]
              if target in {"all", "railway"}:
                  for service_name in variable.get("railway_services", []):
                      service_config = matrix["railway"]["services"].get(service_name, {})
                      service_id_secret = service_config.get("service_id_secret", "")
                      service_id = os.getenv(service_id_secret)
                      if not service_id:
                          raise RuntimeError(
                              f"Missing required secret {service_id_secret} for Railway service '{service_name}'."
                          )
                      plan.append(
                          {
                              "provider": "railway",
                              "scope": service_name,
                              "key": key,
                              "service_id": service_id,
                          }
                      )
              if target in {"all", "vercel"}:
                  for vercel_env in variable.get("vercel_environments", []):
                      plan.append(
                          {
                              "provider": "vercel",
                              "scope": vercel_env,
                              "key": key,
                          }
                      )

          if not plan:
              raise RuntimeError(
                  f"No targets resolved for group='{group_name}' and target='{target}'. Check matrix mapping."
              )

          print(f"Rotation group: {group_name}")
          print(f"Target: {target}")
          print(f"Dry run: {dry_run}")
          print(f"Planned updates: {len(plan)}")
          for item in plan:
              print(f"- {item['provider']}/{item['scope']} key={item['key']}")

          if not dry_run:
              for item in plan:
                  if item["provider"] == "railway":
                      railway_upsert(item["service_id"], item["key"], generated_value)
                  elif item["provider"] == "vercel":
                      vercel_upsert(item["scope"], item["key"], generated_value)

          if "automation_groups" not in rotation_log:
              rotation_log["automation_groups"] = []

          found = None
          for entry in rotation_log["automation_groups"]:
              if entry.get("group") == group_name and entry.get("target") == target:
                  found = entry
                  break

          if found is None:
              found = {
                  "group": group_name,
                  "target": target,
                  "last_rotated": None,
                  "last_mode": None,
                  "last_run_at": None,
              }
              rotation_log["automation_groups"].append(found)

          found["last_mode"] = "dry_run" if dry_run else "apply"
          found["last_run_at"] = now_iso
          if not dry_run:
              found["last_rotated"] = today_iso

          OUTPUT_LOG_PATH.write_text(
              json.dumps(rotation_log, indent=2) + "\n",
              encoding="utf-8",
          )
          print(f"Wrote updated rotation log artifact: {OUTPUT_LOG_PATH}")
          if dry_run:
              print("Dry run completed. Provider values were not changed.")
          else:
              print("Rotation completed. Secret values were distributed to selected targets.")
          PYEOF

      - name: Upload updated rotation log artifact
        uses: actions/upload-artifact@v4
        with:
          name: rotation-log-updated
          path: rotation-log.updated.json
          if-no-files-found: error
