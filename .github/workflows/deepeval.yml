name: DeepEval (Optional)

on:
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize, reopened, labeled]
    paths:
      - "apps/api/**"
      - "evals/**"
      - ".github/workflows/deepeval.yml"

permissions:
  contents: read

jobs:
  deepeval:
    if: github.event_name == 'workflow_dispatch' || contains(github.event.pull_request.labels.*.name, 'deepeval')
    runs-on: ubuntu-latest
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v5
      - name: Install dependencies
        run: uv sync --extra dev --extra deepeval
      - name: Run DeepEval smoke tests (offline only)
        run: uv run pytest tests/deep_eval -m "not live_llm"
