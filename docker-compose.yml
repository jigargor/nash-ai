services:
  postgres:
    image: postgres:16
    command:
      - /bin/sh
      - -c
      - >
        cp /etc/postgres/certs/server.crt /var/lib/postgresql/server.crt &&
        cp /etc/postgres/certs/server.key /var/lib/postgresql/server.key &&
        chmod 600 /var/lib/postgresql/server.key &&
        exec docker-entrypoint.sh postgres
        -c ssl=on
        -c ssl_cert_file=/var/lib/postgresql/server.crt
        -c ssl_key_file=/var/lib/postgresql/server.key
    environment:
      POSTGRES_DB: codereview
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: dev
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./apps/api/certs/postgres:/etc/postgres/certs:ro

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  pgdata:
