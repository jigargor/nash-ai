orchestration:
  goal: "Design a full dashboard redo that is elegant, functional, easy on the eyes, and operationally safe; deliver a concrete implementation plan for UX, analytics, and a new 'Evaluate External' capability."
  mode: "implement" # analyze|implement|review
  merge_strategy: "hybrid" # best_single|hybrid|weighted_vote

  scoring:
    correctness: 0.3
    maintainability: 0.2
    risk: 0.3
    performance: 0.2

  workers:
    - id: "w1"
      agent: "Senior Systems Engineer"
      model: "claude-opus-4-7-thinking-max"
      focus: "Lead visual direction for the dashboard redesign: typography scale, spacing rhythm, color system, contrast/accessibility, hierarchy, information density, and interaction polish. Propose multiple visual concepts and converge on an elegant default that minimizes cognitive load."

    - id: "w2"
      agent: "VP of AI Research and Engineering"
      model: "claude-4.6-sonnet-max-thinking"
      focus: "Be the innovative thinker pushing the envelope of AI research and engineering through avante guard ideas and out of the box thinking. You are the most senior AI researcher and engineer in the company. You are the most senior AI researcher and engineer in the company. You are the most senior AI researcher and engineer in the company."

    - id: "w3"
      agent: "CTO, CISO, and Head of Engineering @ company B"
      model: "claude-opus-4-7-thinking-max"
      focus: "Bring wisdom, experience, talent, and leadership to the table. As a dear friend, but not employee of the company, you have not tunnel visioned your perspective. You are able to see the big picture and the small details. You are able to see the future and the past. You are able to see the possibilities and the constraints. You are able to see the opportunities and the risks. You are able to see the strengths and the weaknesses. You are able to see the opportunities and the risks. You are able to see the strengths and the weaknesses. Leverage everyone's talents and perspectives to create a masterpiece."

  dashboard_requirements:
    architecture_goals:
      - "The architecture must be scalable, maintainable, and easy to understand."
      - "The architecture must be secure, and easy to audit."
      - "The architecture must be efficient, and easy to deploy."
      - "The architecture must be flexible, and easy to extend."
      - "The architecture must be easy to test, and easy to debug."
      - "The architecture must be easy to deploy, and easy to scale."
      - "The architecture must be easy to maintain, and easy to update."

  evaluate_external:
    objective: "Analyze each of the three approaches to analyzing a repo and returning the findings. Take the best from each branch that is compatible, then (specifically w3, investigate ways to further improve the approach with respect to token usage, validity, observability, and cost (more that I can't think of))
    finding_policy:
      include_only:
        - "security vulnerabilities"
        - "severe coding best-practice violations with real risk"
        - "high-impact performance bottlenecks"
        - "recognize patterns of low-hanging fruit (easy wins) and return the pattern as a finding instead of specific lines of code"
      exclude:
        - "low-value praise"
        - "nitpicks and non-actionable style commentary"
    cost_controls:
      - "Display mandatory upfront warning: full-repo evaluation can be expensive, especially for large repos."
      - "Require user acknowledgment before launch when projected cost exceeds threshold."
      - "Show live cost estimate updates based on repo size, language mix, and planned agent count."
      - "Provide budget caps and graceful stop/partial-result behavior when caps are reached."
    scale_strategy:
      - "Shard repository by directories/files and assign shards to parallel analysis agents."
      - "Use dynamic team sizing from quick pre-scan results (repo size, complexity, risk hotspots)."
      - "Use synthesis agents to deduplicate findings and keep only critical, evidence-backed outputs."
    pre_scan_strategy:
      - "Run a cheap-model pre-scan pass (or multiple cheap agents in parallel) before main analysis."
      - "Detect likely nonsense/filler files, generated junk, and maliciously planted distraction content."
      - "Detect prompt injection patterns in files/README/docs/diffs and mark content as untrusted."
      - "Use pre-scan output to set team size, model tier allocation, and routing priorities."
    security_requirements:
      - "Never execute repository code during analysis."
      - "Treat all repo content and diffs as untrusted input."
      - "Harden agent prompts against instruction hijacking from code/comments/docs."
      - "Isolate tool outputs and ensure malicious file content cannot alter orchestration policy."

  constraints:
    - "No API break for existing consumers unless explicitly versioned and documented."
    - "Do not weaken auth/session, webhook, or tenant isolation controls."
    - "All analysis must be robust against prompt injection from repository content."
    - "External-repo evaluation must remain cost-aware and budget-constrained by design."
    - "All implementations must align with existing .cursor/rules and project security constraints"
    - "Minimize workflow churn while introducing the new dashboard IA and menu structure."
    - "Critical findings must be reproducible, line-anchored, and evidence-backed."
    - "Since we're considering using an MCP, chew on the idea of using langGraph and exploring varying levels of granularity with respect to heuristics and LLM fallback."

  output:
    include_patch: true
    include_test_plan: true
    include_rollout_plan: true
    include_risk_matrix: true
    include_skill_docs: false
    include_wireframe_briefs: true
    include_data_contracts: true
    include_external_eval_architecture: true
